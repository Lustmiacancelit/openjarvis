[intelligence]
default_model = "claude-sonnet-4-6"
preferred_engine = "cloud"
provider = "anthropic"
temperature = 0.7
max_tokens = 2048

[agent]
default_agent = "simple"
max_turns = 10
tools = "web_search,calculator,think"
context_from_memory = false

[tools.storage]
default_backend = "sqlite"
db_path = "/tmp/memory.db"

[tools.mcp]
enabled = false

[engine]
default = "cloud"

[engine.ollama]
host = "http://localhost:11434"

[learning]
enabled = false

[telemetry]
enabled = false
db_path = "/tmp/telemetry.db"

[traces]
enabled = false
db_path = "/tmp/traces.db"

[server]
host = "0.0.0.0"
port = 8000
agent = "simple"
cors_origins = [
  "https://jarvis.flowlog.dev",
  "https://www.jarvis.flowlog.dev",
  "https://web-production-9b96.up.railway.app",
]
